<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>CUTTLEFISH logo</title>
  <desc>Minimal geometric cuttlefish-inspired adaptive routing logo.</desc>
  <rect width="1024" height="1024" rx="112.64" fill="#061B49"/>
  <g id="cuttlefish-icon" transform="" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer soft system boundary / mantle silhouette -->
    <path d="M512 172
             C348 172 244 285 244 432
             C244 584 358 688 512 688
             C666 688 780 584 780 432
             C780 285 676 172 512 172Z"
