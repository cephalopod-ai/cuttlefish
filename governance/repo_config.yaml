schema_version: "3.3"
repo_id: "cuttlefish"
repo_type: "service"
repo_name: "cuttlefish"
description: "Lightweight AI gateway daemon and dashboard for orchestrating professional AI coding CLIs."
owner: "human_operator"
stage: "active_dev"
rigor: "normal"
maturity: "active"
sensitivity: "public"
exceptions_ref: "governance/exceptions.yaml"
traits:
  - "typescript"
  - "pnpm"
  - "turborepo"
  - "service_backend"
watcher_packs:
  - "docs"
  - "agent_coding"
family: "application"
entry_points:
  - kind: "cli"
    path: "packages/cuttlefish/bin/cuttlefish.ts"
    package: "cuttlefish-cli"
  - kind: "api"
    path: "packages/cuttlefish/src/gateway/api.ts"
  - kind: "ui"
    path: "packages/web/src/main.tsx"
validation_commands:
  typecheck: "pnpm typecheck"
  test: "pnpm test"
  lint: "pnpm lint"
  build: "pnpm build"
non_goals:
  - "Cuttlefish is a bus around engine CLIs, not a model provider or replacement coding engine."
